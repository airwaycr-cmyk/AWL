<style>
:root {
  --navy: #1B1A16;
  --navy-soft: #2A2823;
  --blue: #FF6B3D;
  --blue-light: #FFB79A;
  --orange: #FF6B3D;
  --bg: #F4EEE2;
  --card: #FFFFFF;
  --ink: #1B1A16;
  --ink-soft: #6E6657;
  --line: #E8DFCB;
  --radius: 18px;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; }
body {
  font-family: 'Inter', -apple-system, sans-serif;
  background: var(--bg);
  color: var(--ink);
  overscroll-behavior-y: none;
}
h1, h2, h3, .brand { font-family: 'Montserrat', sans-serif; }

#app { display: flex; flex-direction: column; height: 100vh; height: 100dvh; max-width: 480px; margin: 0 auto; background: var(--bg); position: relative; }

/* ---- Header ---- */
.topbar {
  background: #FFFFFF;
  padding: max(20px, env(safe-area-inset-top)) 20px 20px;
  color: var(--ink);
  border-bottom: 1px solid var(--line);
}
.logo-lockup {
  font-family: 'Bricolage Grotesque', 'Arial Black', sans-serif;
  font-weight: 800;
  font-size: 30px;
  line-height: 1;
  letter-spacing: -0.025em;
  color: #1B1A16;
}
.logo-lockup .way {
  color: #FF6B3D;
  position: relative;
  display: inline-block;
}
.logo-lockup .way::after {
  content: '';
  position: absolute;
  left: 0; right: 0;
  bottom: -4px;
  height: 3px;
  background: #FF6B3D;
  border-radius: 2px;
}
.topbar .sub { font-size: 13px; color: var(--ink-soft); margin-top: 8px; font-weight: 500; }

/* ---- Screens ---- */
.screen { flex: 1; overflow-y: auto; padding: 18px 18px 100px; display: none; }
.screen.active { display: block; }

.section-title { font-size: 15px; font-weight: 700; color: var(--navy); margin: 4px 0 12px; letter-spacing: -0.01em; }
.card { background: var(--card); border-radius: var(--radius); padding: 18px; box-shadow: 0 1px 3px rgba(9,26,54,0.06), 0 1px 2px rgba(9,26,54,0.04); border: 1px solid var(--line); margin-bottom: 14px; }

/* ---- Cotizador ---- */
.toggle-group { display: flex; background: #EDF1F8; border-radius: 12px; padding: 4px; margin-bottom: 16px; }
.toggle-btn { flex: 1; text-align: center; padding: 10px 0; font-size: 13.5px; font-weight: 600; color: var(--ink-soft); border-radius: 9px; cursor: pointer; transition: all 0.15s; user-select: none; }
.toggle-btn.active { background: var(--navy); color: white; }

label.field-label { font-size: 12px; font-weight: 600; color: var(--ink-soft); text-transform: uppercase; letter-spacing: 0.04em; display: block; margin: 14px 0 6px; }
input.field-input {
  width: 100%; padding: 13px 14px; border-radius: 12px; border: 1.5px solid var(--line);
  font-size: 15.5px; font-family: 'Inter', sans-serif; color: var(--ink); background: #FBFCFE;
  outline: none; transition: border-color 0.15s;
}
input.field-input:focus { border-color: var(--blue); }
